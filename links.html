<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terry's Hub</title>
  <style>
    /* ===== 暖米白 + 棕灰主題 + 深色模式 ===== */
    :root {
      --bg: #f5f1e8;          /* 暖米白底色 */
      --fg: #3a3530;          /* 棕色主文字 */
      --fg-muted: #7a7268;    /* 深灰副文字 */
      --card: #ffffff;        /* 卡片底色 */
      --btn-bg: #ffffff;
      --btn-fg: #3a3530;
      --btn-border: #d9d2c4;
      --btn-hover-bg: #3a3530;
      --btn-hover-fg: #f5f1e8;
      --btn-hover-shadow: rgba(58, 53, 48, 0.25);
      --accent: #8a6a4a;      /* 棕色點綴 */
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1816;
        --fg: #f5f1e8;
        --fg-muted: #a8a098;
        --card: #252220;
        --btn-bg: #252220;
        --btn-fg: #f5f1e8;
        --btn-border: #3a3530;
        --btn-hover-bg: #f5f1e8;
        --btn-hover-fg: #1a1816;
        --btn-hover-shadow: rgba(245, 241, 232, 0.2);
        --accent: #c9a878;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK",
                   "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--fg);
      transition: background 0.3s ease, color 0.3s ease;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .hub {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .hub__title {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--fg);
      position: relative;
      padding-bottom: 12px;
    }

    .hub__title::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .hub__nav {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hub-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 20px 28px;
      font-size: 18px;
      font-weight: 500;
      text-decoration: none;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: 1.5px solid var(--btn-border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .hub-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-fg);
      border-color: var(--btn-hover-bg);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--btn-hover-shadow);
    }

    .hub-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px var(--btn-hover-shadow);
    }

    .hub-btn__icon {
      font-size: 22px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <main class="hub">
    <h1 class="hub__title">Terry's Hub</h1>

    <nav class="hub__nav" aria-label="常用連結">

      <!-- 唯一初始按鍵 -->
      <a class="hub-btn"
         href="https://radio.garden/"
         target="_blank"
         rel="noopener noreferrer">
        <span class="hub-btn__icon" aria-hidden="true">🌍</span>
        <span>全球收音機</span>
      </a>

      <!--
      ============================================
      這裡可以複製貼上追加新按鍵
      ============================================
      範本（複製下面整段 <a ...>...</a>，貼喺上面按鍵下面即可）：

      <a class="hub-btn"
         href="https://example.com"
         target="_blank"
         rel="noopener noreferrer">
        <span class="hub-btn__icon" aria-hidden="true">🔗</span>
        <span>連結名稱</span>
      </a>

      記得改：
      1. href="..."   → 目標網址
      2. 🔗           → Emoji 圖示
      3. 連結名稱     → 你嘅按鍵文字
      ============================================
      -->

    </nav>
  </main>
</body>
</html>
